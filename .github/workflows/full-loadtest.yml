name: Full Load Test — 1500 Users

on:
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Artillery
        run: npm install -g artillery@latest

      - name: Run Full Load Test
        env:
          ARTILLERY_CLOUD_API_KEY: ${{ secrets.ARTILLERY_CLOUD_API_KEY }}
        run: |
          artillery run \
            --record \
            --output report.json \
            bondos-full-test.yml

      - name: Generate HTML Report
        if: always()
        run: artillery report report.json --output report.html

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: |
            report.json
            report.html
