mkdir -p ~/bondos-vite/.github/workflows
cat > ~/bondos-vite/.github/workflows/loadtest.yml << 'EOF'
name: Harvard Load Test
on:
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest  # GitHub's US servers
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install -g artillery
      - run: artillery run harvard-test.yml
EOF
