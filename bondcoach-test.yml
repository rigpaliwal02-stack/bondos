scenarios:
  - name: "Bond Coach"
    flow:
      - post:
          url: "/functions/v1/bond-coach"
          json:
            mode: "bond_coach"
            userMessage: "How do I improve my relationship?"

  - name: "Load profiles"
    flow:
      - get:
          url: "/rest/v1/profiles?select=*&limit=10"

  - name: "Load couples feed"
    flow:
      - get:
          url: "/rest/v1/couples?select=*&order=bond_score.desc&limit=20"

  - name: "Load posts"
    flow:
      - get:
          url: "/rest/v1/posts?select=*&order=created_at.desc&limit=20"

  - name: "Ship it feed"
    flow:
      - get:
          url: "/rest/v1/ship_it?select=*&order=created_at.desc&limit=50"
